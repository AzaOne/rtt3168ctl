name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build artifacts (${{ matrix.target_os }}/${{ matrix.target_arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target_os: linux
            target_arch: 386
          - runner: ubuntu-latest
            target_os: linux
            target_arch: amd64
          - runner: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libusb (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ "${{ matrix.target_arch }}" = "386" ]; then
            sudo dpkg --add-architecture i386
            sudo apt-get update
            sudo apt-get install -y gcc-multilib libusb-1.0-0-dev libusb-1.0-0-dev:i386
          else
            sudo apt-get update
            sudo apt-get install -y libusb-1.0-0-dev
          fi

      - name: Build release binary
        shell: bash
        env:
          GOOS: ${{ matrix.target_os }}
          GOARCH: ${{ matrix.target_arch }}
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail
          if [ "${GOOS}" = "linux" ] && [ "${GOARCH}" = "386" ]; then
            export CC="gcc -m32"
            export PKG_CONFIG_PATH="/usr/lib/i386-linux-gnu/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
            export PKG_CONFIG_LIBDIR="/usr/lib/i386-linux-gnu/pkgconfig:/usr/share/pkgconfig"
          fi
          BIN_NAME="rtt3168ctl-${GOOS}-${GOARCH}"
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "dist/${BIN_NAME}" ./cmd/rtt3168ctl

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist/rtt3168ctl-*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-artifacts

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/rtt3168ctl-*
          generate_release_notes: true
