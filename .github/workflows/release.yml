name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libusb (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev

      - name: Install libusb (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb

      - name: Build release archive
        shell: bash
        run: |
          set -euo pipefail
          GOOS="$(go env GOOS)"
          GOARCH="$(go env GOARCH)"
          BIN_NAME="rtt3168ctl-${GOOS}-${GOARCH}"
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "dist/${BIN_NAME}" ./cmd/rtt3168ctl
          tar -C dist -czf "dist/${BIN_NAME}.tar.gz" "${BIN_NAME}"
          shasum -a 256 "dist/${BIN_NAME}.tar.gz" > "dist/${BIN_NAME}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-artifacts

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
