name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build artifacts (${{ matrix.target_os }}/${{ matrix.target_arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target_os: linux
            target_arch: amd64
            bin_ext: ""
          - runner: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64
            bin_ext: ""
          - runner: macos-13
            target_os: darwin
            target_arch: amd64
            bin_ext: ""
          - runner: macos-14
            target_os: darwin
            target_arch: arm64
            bin_ext: ""
          - runner: windows-latest
            target_os: windows
            target_arch: amd64
            bin_ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libusb (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev

      - name: Install libusb (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb

      - name: Install libusb (Windows)
        if: runner.os == 'Windows'
        run: choco install -y libusb

      - name: Build release binary
        shell: bash
        env:
          GOOS: ${{ matrix.target_os }}
          GOARCH: ${{ matrix.target_arch }}
          BIN_EXT: ${{ matrix.bin_ext }}
        run: |
          set -euo pipefail
          BIN_NAME="rtt3168ctl-${GOOS}-${GOARCH}${BIN_EXT}"
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "dist/${BIN_NAME}" ./cmd/rtt3168ctl

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist/rtt3168ctl-*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-artifacts

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/rtt3168ctl-*
          generate_release_notes: true
